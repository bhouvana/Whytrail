name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install whytrail (core + dev)
        run: pip install -e ".[dev]"

      - name: Type-check with mypy --strict
        run: mypy

      - name: Run core test suite
        run: pytest tests -q

  plugin-contract-tests:
    # Each plugin has its own third-party dependency (pandas, sqlalchemy,
    # fastapi, ...); installing all of them into the core matrix above
    # would make every core-only change pay for every plugin's install
    # time. Kept separate so a plugin dependency bump can't block a
    # core-only PR, and vice versa.
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        plugin:
          - whytrail-requests
          - whytrail-pytest
          - whytrail-sentry
          - whytrail-pandas
          - whytrail-sqlalchemy
          - whytrail-fastapi
          - whytrail-django
          - whytrail-celery
          - whytrail-langchain
          - whytrail-pydantic
          - whytrail-boto3
          - whytrail-httpx
          - whytrail-openai
          - whytrail-anthropic
          - whytrail-asyncpg
          - whytrail-pymongo
          - whytrail-marshmallow
          - whytrail-jsonschema
          - whytrail-polars
          - whytrail-rq
          - whytrail-dramatiq
          - whytrail-flask
          - whytrail-pyyaml
          - whytrail-grpcio
          - whytrail-scrapy
          - whytrail-aiohttp
          - whytrail-huggingface-hub
          - whytrail-google-cloud
          - whytrail-ddtrace
          - whytrail-prefect
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install whytrail + plugin under test + test deps
        run: |
          pip install -e ".[dev]"
          pip install -e "./plugins/${{ matrix.plugin }}"

      - name: Run this plugin's contract tests
        run: |
          # Strip the "whytrail-" prefix, then convert any remaining
          # dashes to underscores -- needed for plugins like
          # whytrail-google-cloud and whytrail-huggingface-hub, whose test
          # files (test_google_cloud_plugin.py,
          # test_huggingface_hub_plugin.py) use underscores throughout.
          # A prefix-only strip would look for a literal dash in the
          # filename and silently match zero tests.
          name="${{ matrix.plugin }}"
          test_name="${name#whytrail-}"
          test_name="${test_name//-/_}"
          pytest "tests/plugin_contract/test_${test_name}_plugin.py" -q

  plugin-version-matrix:
    # docs/testing-maturity.md gap #1: every plugin above installs
    # whatever `pip` resolves today, never the specific floor each
    # pyproject.toml claims to support. Checking that floor for real
    # (on Python 3.13, before writing this job) found ten more
    # version-compatibility bugs beyond the two that started this job,
    # none of which existed in theory -- every one only showed up by
    # actually running `pip install <dep>==<stated-floor>` and
    # importing the result:
    #   - pydantic==2.0.3: no 3.13 wheel; pydantic-core fails to build
    #     from source (ForwardRef._evaluate() signature changed).
    #     First working version: 2.8.0.
    #   - sqlalchemy==2.0.0: installs, crashes on import -- its
    #     TypingOnly assertion predates __firstlineno__ and
    #     __static_attributes__, two dunders 3.13 added to every
    #     class. First working version: 2.0.36.
    #   - asyncpg==0.29.0: fails to build -- pgproto.c calls
    #     _PyLong_AsByteArray with the pre-3.13 argument count; the
    #     C API's signature changed. First working version: 0.30.0.
    #   - pyyaml==6.0: no 3.13 wheel; source build fails
    #     (`'build_ext' object has no attribute 'cython_sources'`, a
    #     Cython/setuptools mismatch). First working version: 6.0.2.
    #   - grpcio==1.60.0: no 3.13 wheel on any platform, source build
    #     fails. First working version: 1.66.2.
    #   - ddtrace==2.0.0: no 3.13 wheel. First working version: 2.19.0.
    #   - pandas==2.0.0: no 3.13 wheel. First working version: 2.2.3.
    #   - marshmallow==3.0.0: imports `distutils.version.LooseVersion`,
    #     removed from the standard library in 3.12 (PEP 632). First
    #     working version found by bisection: 3.15.0.
    #   - requests==2.20.0: imports `urllib3.packages.six.moves`, a
    #     bundled-six shim urllib3 2.0 removed -- an old requests
    #     pinned against a urllib3 major version old enough to predate
    #     that shim's removal. First working version found by
    #     bisection: 2.25.0.
    #   - prefect==2.14.0..2.19.0: `from griffe.dataclasses import
    #     Docstring` -- a griffe internal path prefect's own floor
    #     depended on, removed by a later griffe release since griffe
    #     isn't itself version-pinned. First working version: 2.20.0.
    # Every other plugin's stated floor (boto3, httpx, flask, django,
    # celery, dramatiq, rq, sentry-sdk, langchain-core,
    # huggingface_hub, google-api-core, anthropic, openai, pytest,
    # jsonschema, scrapy, polars, aiohttp, starlette, pymongo) was
    # checked the same way and confirmed to already work on 3.13 --
    # not assumed, just not broken.
    # This job pins each plugin's *actual* Python-3.13-compatible
    # floor (not the aspirational one in pyproject.toml, which is
    # still correct for older Python versions) against the latest
    # release, so a future dependency bump that reintroduces a gap
    # like this fails CI instead of being discovered by a user.
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - plugin: whytrail-pydantic
            dependency: pydantic
            floor: "2.8.0"
          - plugin: whytrail-sqlalchemy
            dependency: sqlalchemy
            floor: "2.0.36"
          - plugin: whytrail-asyncpg
            dependency: asyncpg
            floor: "0.30.0"
          - plugin: whytrail-pyyaml
            dependency: pyyaml
            floor: "6.0.2"
          - plugin: whytrail-grpcio
            dependency: grpcio
            floor: "1.66.2"
          - plugin: whytrail-ddtrace
            dependency: ddtrace
            floor: "2.19.0"
          - plugin: whytrail-pandas
            dependency: pandas
            floor: "2.2.3"
          - plugin: whytrail-marshmallow
            dependency: marshmallow
            floor: "3.15.0"
          - plugin: whytrail-requests
            dependency: requests
            floor: "2.25.0"
          - plugin: whytrail-prefect
            dependency: prefect
            floor: "2.20.0"
          - plugin: whytrail-polars
            dependency: polars
            floor: "0.20.0"
          - plugin: whytrail-aiohttp
            dependency: aiohttp
            floor: "3.9.0"
          - plugin: whytrail-boto3
            dependency: boto3
            floor: "1.34.0"
          - plugin: whytrail-httpx
            dependency: httpx
            floor: "0.27.0"
          - plugin: whytrail-flask
            dependency: flask
            floor: "2.3.0"
          - plugin: whytrail-django
            dependency: django
            floor: "4.2.0"
          - plugin: whytrail-celery
            dependency: celery
            floor: "5.3.0"
          - plugin: whytrail-dramatiq
            dependency: dramatiq
            floor: "1.14.0"
          - plugin: whytrail-rq
            dependency: rq
            floor: "1.15.0"
          - plugin: whytrail-sentry
            dependency: sentry-sdk
            floor: "2.0.0"
          - plugin: whytrail-langchain
            dependency: langchain-core
            floor: "0.2.0"
          - plugin: whytrail-huggingface-hub
            dependency: huggingface_hub
            floor: "0.20.0"
          - plugin: whytrail-google-cloud
            dependency: google-api-core
            floor: "2.15.0"
          - plugin: whytrail-anthropic
            dependency: anthropic
            floor: "0.30.0"
          - plugin: whytrail-openai
            dependency: openai
            floor: "1.0.0"
          - plugin: whytrail-pytest
            dependency: pytest
            floor: "7.0.0"
          - plugin: whytrail-jsonschema
            dependency: jsonschema
            floor: "4.0.0"
          - plugin: whytrail-scrapy
            dependency: scrapy
            floor: "2.8.0"
          - plugin: whytrail-fastapi
            dependency: starlette
            floor: "0.36.0"
          - plugin: whytrail-pymongo
            dependency: pymongo
            floor: "4.0.0"
        dependency-version: [floor, latest]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install whytrail + plugin (without its dependency pin)
        run: |
          pip install -e ".[dev]"
          pip install -e "./plugins/${{ matrix.plugin }}" --no-deps

      - name: Install the dependency at the version under test
        run: |
          if [ "${{ matrix.dependency-version }}" = "floor" ]; then
            pip install "${{ matrix.dependency }}==${{ matrix.floor }}"
          else
            pip install --upgrade "${{ matrix.dependency }}"
          fi

      - name: Run this plugin's contract tests
        run: |
          name="${{ matrix.plugin }}"
          test_name="${name#whytrail-}"
          test_name="${test_name//-/_}"
          pytest "tests/plugin_contract/test_${test_name}_plugin.py" -q

  benchmarks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - name: Run performance benchmarks (informational, not a merge gate yet)
        run: pytest benchmarks/ --benchmark-only
        continue-on-error: true
