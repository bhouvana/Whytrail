          - { extra: honeybadger, dependency: honeybadger, floor: "0.15", python-version: "3.12" }
          - { extra: elastic-apm, dependency: elastic-apm, floor: "6.15", python-version: "3.12" }
          - { extra: bugsnag, dependency: bugsnag, floor: "4.5", python-version: "3.12" }
          - { extra: structlog, dependency: structlog, floor: "23.1", python-version: "3.12" }
          - { extra: loguru, dependency: loguru, floor: "0.7", python-version: "3.12" }
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install whytrail (core only -- the dependency under test is pinned separately below)
        run: pip install -e ".[dev]"

      - name: Install this integration's test-only tools, if any
        run: |
          case "${{ matrix.extra }}" in
            fastapi) pip install httpx ;;
            rq) pip install fakeredis ;;
          esac

      - name: Install the dependency at pyproject.toml's stated floor
        run: pip install "${{ matrix.dependency }}==${{ matrix.floor }}"

      - name: Run this integration's contract tests
        run: |
          name="${{ matrix.extra }}"
          test_name="${name//-/_}"
          pytest "tests/plugin_contract/test_${test_name}_plugin.py" -q

  benchmarks:
    # Skip on the weekly schedule trigger, same reasoning as `test` above.
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - name: Run performance benchmarks (informational, not a merge gate yet)
        run: pytest benchmarks/ --benchmark-only
        continue-on-error: true

      # Regression gate, added on explicit request. No fixed numeric
      # threshold ("track() must stay under 3us forever") -- confirmed
      # directly (see the two runs recorded in this comment's history)
      # that GitHub-hosted runner variance alone is a meaningfully larger
      # effect than that would tolerate, which would make a hard absolute
      # threshold fail on noise, not on real regressions. Instead: cache
      # `.benchmarks/` across runs on this same OS/Python combination via
      # actions/cache, and use pytest-benchmark's own `--benchmark-compare`
      # against whatever the *previous* run on this branch actually
      # recorded, gated generously (min:400% -- fail only past a 5x
      # slowdown). That threshold is deliberately far above normal
      # run-to-run noise and comfortably below the ~100x regression this
      # benchmark suite's own history already caught once (see
      # benchmarks/test_overhead.py's docstring) -- it exists to catch an
      # order-of-magnitude regression, not to be a tight bound.
      #
      # No baseline is committed to the repo: a baseline generated locally
      # (this session ran on Windows) lives under a different
      # machine-info bucket than `ubuntu-latest` and would never be
      # matched by --benchmark-compare on CI, or worse, would be compared
      # against as if it were a like-for-like number when it isn't. The
      # cache below is deliberately the only source of history, and it
      # starts from whatever this job's *first* real run on GitHub's
      # actual runners records -- not from anything produced in this
      # sandbox. The first real run establishes the baseline.
      #
      # That first run is exactly where this step's original assumption
      # turned out wrong: the comment here used to claim pytest-benchmark
      # "skips the compare-fail gate gracefully when there is nothing yet
      # to compare against." It doesn't -- pytest-benchmark 5.2.3 raises
      # `UsageError: --benchmark-compare-fail requires valid
      # --benchmark-compare` the moment `--benchmark-compare` has no prior
      # run to resolve against, confirmed by reproducing it locally with a
      # genuinely empty storage directory (the previous claim wasn't
      # re-verified against the version actually installed). Fixed by only
      # passing the compare flags once a previous run's JSON file was
      # actually restored from cache.
      - name: Restore previous benchmark history for this OS/Python combination
        uses: actions/cache@v4
        with:
          path: .benchmarks
          key: benchmarks-ubuntu-latest-py3.12-${{ github.run_id }}
          restore-keys: |
            benchmarks-ubuntu-latest-py3.12-

      - name: Performance regression gate (compare against last run, generous tolerance)
        run: |
          if [ -n "$(find .benchmarks -name '*.json' 2>/dev/null)" ]; then
            pytest benchmarks/ --benchmark-only --benchmark-compare --benchmark-compare-fail=min:400% --benchmark-autosave
          else
            echo "No previous benchmark history found (first run on this OS/Python combination) -- establishing baseline, nothing to compare against yet."
            pytest benchmarks/ --benchmark-only --benchmark-autosave
          fi

  mutation-testing:
    # Weekly only, same reasoning as plugin-version-matrix-py-range:
    # mutmut re-runs the scoped test selection once per mutant, which
    # is real cost for real signal, not something every push/PR should
    # pay for. Informational (not a merge gate) -- this answers "does
    # the test suite actually detect wrong behavior in the engine,"
    # which is a question worth tracking over time, not one with an
    # agreed pass/fail bar yet.
    #
    # No native Windows support (confirmed directly -- mutmut's own CLI
    # refuses to run and points at WSL); ubuntu-latest needs no
    # translation layer, unlike the sandbox this was developed in.
    #
    # Scoped to src/whytrail/core (see pyproject.toml's [tool.mutmut]
    # for why: the shared engine every other consumer sits on top of,
    # not the 63 integrations or the CLI, which would multiply mutant
    # count for a question this scope already answers about the
    # foundation they all sit on).
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]" mutmut
      - name: Run mutation testing against core/ (informational)
        run: python -m mutmut run || true
      - name: Show results
        run: python -m mutmut results
