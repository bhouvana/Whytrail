          - { extra: honeybadger, dependency: honeybadger, floor: "0.15.0", dependency-version: latest }
          - { extra: psycopg, dependency: psycopg, floor: "3.1.0", dependency-version: floor }
          - { extra: psycopg, dependency: psycopg, floor: "3.1.0", dependency-version: latest }
          # cassandra-driver==3.25.0 (the original aspirational floor):
          # fails to build on Python 3.13 -- its ancient ez_setup.py
          # bootstrap script calls TarFile.chown() without the
          # numeric_owner argument, which became required in a later
          # Python. Every version through 3.29.0 has this same bug (it's
          # in the package's own decades-old setup tooling, not something
          # that improved incrementally); only fixed in the latest line.
          # First working version, confirmed on real Linux: 3.30.0.
          - { extra: cassandra, dependency: cassandra-driver, floor: "3.30.0", dependency-version: floor }
          - { extra: cassandra, dependency: cassandra-driver, floor: "3.30.0", dependency-version: latest }
          - { extra: influxdb, dependency: influxdb-client, floor: "1.30.0", dependency-version: floor }
          - { extra: influxdb, dependency: influxdb-client, floor: "1.30.0", dependency-version: latest }
          # pyzmq==24.0.0 (the original aspirational floor): no cp313 wheel,
          # and building from source fails with a real C++ compile error
          # (a libzmq/C++ standard-library incompatibility) -- confirmed on
          # real Linux, not just a Windows build-tooling gap. Every version
          # through 26.0.3 has the same gap. First version with a cp313
          # wheel, confirmed on real Linux: 26.1.0.
          - { extra: pyzmq, dependency: pyzmq, floor: "26.1.0", dependency-version: floor }
          - { extra: pyzmq, dependency: pyzmq, floor: "26.1.0", dependency-version: latest }
          # zeep==4.1.0 (the original aspirational floor): zeep's own
          # utils.py imports the stdlib cgi module directly, removed in
          # Python 3.13 (PEP 594, same category as azure-core's floor bug
          # above). Still broken at 4.2.0 and 4.2.1 -- zeep's own code, not
          # a transitive dependency, so the fix had to land in zeep itself.
          # First working version, confirmed on real Linux: 4.3.0.
          - { extra: zeep, dependency: zeep, floor: "4.3.0", dependency-version: floor }
          - { extra: zeep, dependency: zeep, floor: "4.3.0", dependency-version: latest }
          - { extra: elastic-apm, dependency: elastic-apm, floor: "6.15.0", dependency-version: floor }
          - { extra: elastic-apm, dependency: elastic-apm, floor: "6.15.0", dependency-version: latest }
          - { extra: bugsnag, dependency: bugsnag, floor: "4.5.0", dependency-version: floor }
          - { extra: bugsnag, dependency: bugsnag, floor: "4.5.0", dependency-version: latest }
          # structlog/loguru floors: now confirmed against the first real
          # CI run, matching every floor above this comment (each started
          # the same way and was corrected where wrong; see CHANGELOG.md's
          # batch-by-batch floor-correction history). structlog's guess
          # was wrong -- 23.0.0 was never actually published (versions
          # jump 22.3.0 -> 23.1.0) -- loguru's 0.7.0 was confirmed correct.
          - { extra: structlog, dependency: structlog, floor: "23.1.0", dependency-version: floor }
          - { extra: structlog, dependency: structlog, floor: "23.1.0", dependency-version: latest }
          - { extra: loguru, dependency: loguru, floor: "0.7.0", dependency-version: floor }
          - { extra: loguru, dependency: loguru, floor: "0.7.0", dependency-version: latest }
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install whytrail (core only -- the dependency under test is pinned separately below)
        run: pip install -e ".[dev]"

      - name: Install this integration's test-only tools, if any
        run: |
          case "${{ matrix.extra }}" in
            fastapi) pip install httpx ;;
            rq) pip install fakeredis ;;
          esac

      - name: Install the dependency at the version under test
        run: |
          if [ "${{ matrix.dependency-version }}" = "floor" ]; then
            pip install "${{ matrix.dependency }}==${{ matrix.floor }}"
          else
            pip install --upgrade "${{ matrix.dependency }}"
          fi

      - name: Run this integration's contract tests
        run: |
          name="${{ matrix.extra }}"
          test_name="${name//-/_}"
          pytest "tests/plugin_contract/test_${test_name}_plugin.py" -q

  plugin-version-matrix-py-range:
    # testing-maturity.md gap #1 / roadmap.md Phase H: plugin-version-matrix
    # above only ever runs on Python 3.13 -- the 3.10/3.11/3.12 floors every
    # extra also claims to support in pyproject.toml have never actually
    # been installed and exercised the way 3.13's was. That gap is real:
    # checking 3.13 alone already found 20 version-compatibility bugs (see
    # docs/testing-maturity.md), and several of those were 3.13-specific
    # packaging/runtime incompatibilities in the dependency itself -- which
    # means the *original* floor in pyproject.toml (not the 3.13-corrected
    # floor pinned in plugin-version-matrix above) may well already be
    # correct for 3.10-3.12. This job checks that claim for real instead of
    # assuming it, using pyproject.toml's own stated floor for every extra.
    #
    # Deliberately weekly-only (`schedule` trigger), not on every push/PR:
    # docs/roadmap.md Phase H already names the tradeoff directly --
    # "every additional Python version roughly multiplies plugin-version-
    # matrix's job count, so this should land deliberately, not accidentally
    # via scope creep" -- and this job triples plugin-version-matrix's floor
    # checks (62 extras x 3 additional Python versions = 186 jobs). A
    # dependency's stated floor changes rarely enough that weekly detection
    # (the same cadence plugin-version-matrix already runs on, alongside
    # every push) is the right cost/signal tradeoff, not every PR paying for
    # a check whose answer essentially never changes between pushes.
    #
    # Deliberately floor-only, not floor+latest: "latest" is not a
    # per-Python-version claim pyproject.toml makes (it's just "whatever pip
    # resolves today"), so there's no stated claim to verify the way there is
    # for the floor -- doubling this job to also check latest across three
    # more Python versions would be six times the cost of plugin-version-
    # matrix's existing 3.13 coverage for a question this job isn't asking.
    #
    # oracledb is included here (unlike test_redaction_fuzz.py's exclusion
    # of it): that exclusion was about *repeating* a real connection attempt
    # across dozens of Hypothesis examples, not about running its contract
    # test once per Python version, which is exactly what every other extra
    # in this job already does.
