name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install whytrail (core + dev)
        run: pip install -e ".[dev]"

      - name: Type-check with mypy --strict
        run: mypy

      - name: Run core test suite
        run: pytest tests -q

  plugin-contract-tests:
    # ADR 0006: all 30 integrations live inside the single whytrail
    # package as optional extras now, not as 30 separate distributions --
    # so this job installs `whytrail[extra]` from the one package instead
    # of `pip install -e ./plugins/whytrail-X`. Still a separate job from
    # `test` above: each extra pulls in its own third-party dependency
    # (pandas, sqlalchemy, fastapi, ...), and installing all 30 into the
    # core matrix would make every core-only change pay for every
    # integration's install time.
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        extra:
          - requests
          - pytest
          - sentry
          - pandas
          - sqlalchemy
          - fastapi
          - django
          - celery
          - langchain
          - pydantic
          - boto3
          - httpx
          - openai
          - anthropic
          - asyncpg
          - pymongo
          - marshmallow
          - jsonschema
          - polars
          - rq
          - dramatiq
          - flask
          - pyyaml
          - grpcio
          - scrapy
          - aiohttp
          - huggingface-hub
          - google-cloud
          - ddtrace
          - prefect
          - stripe
          - alembic
          - paramiko
          - elasticsearch
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install whytrail[extra] + test-only tools
        run: |
          pip install -e ".[dev,${{ matrix.extra }}]"
          # fastapi's extra is `starlette` (the plugin's real runtime
          # dependency -- see the fastapi note in plugin-version-matrix
          # below), so the actual `fastapi` package + httpx's TestClient
          # are test-only tools, not part of the extra. Same for rq's
          # fakeredis: a real Redis connection is rq's own runtime
          # dependency, correctly not part of the `rq` extra, but the
          # test simulates one instead of requiring a live server in CI.
          # Both found the same way: a missing test-only dependency
          # turned into a silent "no tests collected" (pytest exit 5)
          # rather than a visible failure, on the first real CI run.
          case "${{ matrix.extra }}" in
            fastapi) pip install fastapi httpx ;;
            rq) pip install fakeredis ;;
          esac

      - name: Run this integration's contract tests
        run: |
          # Convert dashes to underscores -- needed for extras like
          # google-cloud and huggingface-hub, whose test files
          # (test_google_cloud_plugin.py, test_huggingface_hub_plugin.py)
          # use underscores throughout.
          name="${{ matrix.extra }}"
          test_name="${name//-/_}"
          pytest "tests/plugin_contract/test_${test_name}_plugin.py" -q

  plugin-version-matrix:
    # docs/testing-maturity.md gap #1: every extra above installs
    # whatever `pip` resolves today, never the specific floor
    # pyproject.toml claims to support. Checking that floor for real
    # found real version-compatibility bugs in two rounds: first locally
    # in this sandbox (Windows, before this job existed), then again --
    # differently -- on the actual ubuntu-latest runners this job
    # targets, the first time it ever executed for real. Neither round
    # alone would have found everything the other did; several "confirmed
    # fine" conclusions from local-only testing turned out wrong once a
    # real CI run actually exercised each integration's contract tests
    # against its pinned floor, not just "does it install and import."
    #
    # No 3.13 wheel / build failure (found locally, still holds on Linux):
    #   - pydantic==2.0.3: pydantic-core fails to build from source
    #     (ForwardRef._evaluate() signature changed). First working: 2.8.0.
    #   - pyyaml==6.0: source build fails (Cython/setuptools mismatch).
    #     First working: 6.0.2.
    #   - grpcio==1.60.0: no 3.13 wheel on any platform. First working: 1.66.2.
    #   - pandas==2.0.0: no 3.13 wheel. First working: 2.2.3.
    #
    # Genuine Python 3.13 runtime incompatibility in the dependency's own
    # code, not a packaging gap:
    #   - sqlalchemy==2.0.0: TypingOnly assertion predates two dunders
    #     3.13 added to every class. First working: 2.0.36.
    #   - asyncpg==0.29.0: pgproto.c calls a C API function with the
    #     pre-3.13 argument count. First working: 0.30.0.
    #   - sentry-sdk==2.0.0: copies frame locals via copy.copy(), which
    #     breaks on 3.13's FrameLocalsProxy (PEP 667) -- passed a local
    #     install-and-import check, only failed when its actual capture
    #     path ran against a real exception in a real CI run. First
    #     working, found by bisection: 2.11.0.
    #   - prefect==2.14.0-2.20.0: not fixable within the 2.x line at all --
    #     `GatherTaskGroup` (prefect's own asyncio.TaskGroup subclass)
    #     doesn't implement an abstract method 3.13's asyncio added,
    #     independent of which pydantic/griffe versions are present. The
    #     floor moved to the 3.x line entirely: 3.7.8 (earlier 3.x
    #     releases have their own pydantic-version-drift issues below).
    #
    # Standard-library removal, unrelated to any single dependency version:
    #   - marshmallow==3.0.0: imports `distutils.version.LooseVersion`,
    #     removed in 3.12 (PEP 632). First working, by bisection: 3.15.0.
    #
    # Transitive-dependency drift -- the floor's own unpinned/loosely-pinned
    # sub-dependency moved on and broke it, nothing to do with Python 3.13:
    #   - requests==2.20.0: imports `urllib3.packages.six.moves`, a shim
    #     urllib3 2.0 removed. First working, by bisection: 2.25.0.
    #   - flask==2.3.0: testing.py reads `werkzeug.__version__`, which
    #     werkzeug 3.x removed. First working: 2.3.3.
    #   - prefect (see above): also hit a `pydantic.ConfigWrapper`
    #     TypeError against pydantic's newest 2.x releases, and separately
    #     a `griffe.Docstring` import removed by a later griffe release --
    #     three independent drift issues layered on the same integration.
    #
    # Integration/test written against a newer version of the SDK's own
    # API than the stated floor actually provides -- not a Python-version
    # or transitive-drift issue, just an old client library:
    #   - ddtrace==2.0.0: `ddtrace.trace.tracer` (a module-level singleton
    #     the test imports) didn't exist yet. First working: 2.20.0.
    #   - openai==1.0.0: exception `.body` shape at this version doesn't
    #     match what the integration reads. First working, by bisection:
    #     1.30.0.
    #   - anthropic==0.30.0: same shape issue. First working: 0.34.0.
    #   - huggingface_hub==0.20.0: `huggingface_hub.errors` (the module the
    #     integration imports) didn't exist yet, and even once it did
    #     (0.22+), `hf_raise_for_status()`'s response-shape handling
    #     didn't match until the 1.x line. First working: 1.0.0 -- a
    #     major-version jump, not a patch bump, the same way prefect
    #     needed one.
    #
    # Not independently version-testable the way this job assumes:
    #   - the fastapi integration's test builds a real FastAPI app, so
    #     `starlette` alone isn't a meaningful axis to pin -- forcing an
    #     old starlette floor (0.36.0) against whatever fastapi the
    #     test-tools step installs breaks on an unrelated TestClient API
    #     mismatch the moment the two are versioned independently.
    #     `fastapi` is the pinned dependency instead (floor 0.115.0, the
    #     oldest version confirmed to both resolve a starlette satisfying
    #     the integration's real >=0.36 floor *and* pass); the test-tools
    #     step below installs only httpx for this one, not fastapi.
    #
    # Every other extra's stated floor (boto3, httpx, django, celery,
    # dramatiq, rq, langchain-core, google-api-core, pytest, jsonschema,
    # scrapy, polars, aiohttp, pymongo) was checked the same way on real
    # ubuntu-latest CI and confirmed to already work -- not assumed, just
    # not (yet) found broken. See docs/testing-maturity.md for why "found
    # broken so far" and "confirmed working" are different-strength claims,
    # and CHANGELOG.md for the full account of both rounds of findings.
    #
    # This job pins each integration's *actual* Python-3.13-compatible
    # floor (not the aspirational one in pyproject.toml, which is still
    # correct for older Python versions) against the latest release, so a
    # future dependency bump that reintroduces a gap like this fails CI
    # instead of being discovered by a user.
    #
    # Each entry below is fully explicit (extra, dependency, floor,
    # dependency-version) rather than an `extra`x`dependency-version`
    # cross-product via a separate `include:` list. The cross-product
    # form was tried first and is wrong: `include` entries only merge
    # into a base matrix when they share a key with it, and these entries
    # share no key with a bare `dependency-version: [floor, latest]` axis
    # -- so instead of the intended 60 jobs (30 extras x 2 versions), only
    # 2 generic jobs ran, both missing extra context entirely. Not caught
    # by local `mkdocs`/`mypy`/`pytest` verification, since none of those
    # parse this workflow file -- only found by watching the first real
    # push actually run it and seeing "plugin-version-matrix (floor)" and
    # "(latest)" instead of 60 named jobs.
    #
    # ADR 0006 note: since every integration's code now lives inside the
    # whytrail package itself rather than a separate distribution, there's
    # no more "install the plugin package without its dependency pin"
    # step -- `pip install -e ".[dev]"` alone already puts the integration
    # module on disk; it just won't successfully register until the
    # dependency below is installed too (src/whytrail/registry.py's
    # _load_builtin_explainers() catches the ImportError until then).
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { extra: pydantic, dependency: pydantic, floor: "2.8.0", dependency-version: floor }
          - { extra: pydantic, dependency: pydantic, floor: "2.8.0", dependency-version: latest }
          - { extra: sqlalchemy, dependency: sqlalchemy, floor: "2.0.36", dependency-version: floor }
          - { extra: sqlalchemy, dependency: sqlalchemy, floor: "2.0.36", dependency-version: latest }
          - { extra: asyncpg, dependency: asyncpg, floor: "0.30.0", dependency-version: floor }
          - { extra: asyncpg, dependency: asyncpg, floor: "0.30.0", dependency-version: latest }
          - { extra: pyyaml, dependency: pyyaml, floor: "6.0.2", dependency-version: floor }
          - { extra: pyyaml, dependency: pyyaml, floor: "6.0.2", dependency-version: latest }
          - { extra: grpcio, dependency: grpcio, floor: "1.66.2", dependency-version: floor }
          - { extra: grpcio, dependency: grpcio, floor: "1.66.2", dependency-version: latest }
          - { extra: ddtrace, dependency: ddtrace, floor: "2.20.0", dependency-version: floor }
          - { extra: ddtrace, dependency: ddtrace, floor: "2.20.0", dependency-version: latest }
          - { extra: pandas, dependency: pandas, floor: "2.2.3", dependency-version: floor }
          - { extra: pandas, dependency: pandas, floor: "2.2.3", dependency-version: latest }
          - { extra: marshmallow, dependency: marshmallow, floor: "3.15.0", dependency-version: floor }
          - { extra: marshmallow, dependency: marshmallow, floor: "3.15.0", dependency-version: latest }
          - { extra: requests, dependency: requests, floor: "2.25.0", dependency-version: floor }
          - { extra: requests, dependency: requests, floor: "2.25.0", dependency-version: latest }
          - { extra: prefect, dependency: prefect, floor: "3.7.8", dependency-version: floor }
          - { extra: prefect, dependency: prefect, floor: "3.7.8", dependency-version: latest }
          - { extra: polars, dependency: polars, floor: "0.20.0", dependency-version: floor }
          - { extra: polars, dependency: polars, floor: "0.20.0", dependency-version: latest }
          - { extra: aiohttp, dependency: aiohttp, floor: "3.9.0", dependency-version: floor }
          - { extra: aiohttp, dependency: aiohttp, floor: "3.9.0", dependency-version: latest }
          - { extra: boto3, dependency: boto3, floor: "1.34.0", dependency-version: floor }
          - { extra: boto3, dependency: boto3, floor: "1.34.0", dependency-version: latest }
          - { extra: httpx, dependency: httpx, floor: "0.27.0", dependency-version: floor }
          - { extra: httpx, dependency: httpx, floor: "0.27.0", dependency-version: latest }
          - { extra: flask, dependency: flask, floor: "2.3.3", dependency-version: floor }
          - { extra: flask, dependency: flask, floor: "2.3.3", dependency-version: latest }
          - { extra: django, dependency: django, floor: "4.2.0", dependency-version: floor }
          - { extra: django, dependency: django, floor: "4.2.0", dependency-version: latest }
          - { extra: celery, dependency: celery, floor: "5.3.0", dependency-version: floor }
          - { extra: celery, dependency: celery, floor: "5.3.0", dependency-version: latest }
          - { extra: dramatiq, dependency: dramatiq, floor: "1.14.0", dependency-version: floor }
          - { extra: dramatiq, dependency: dramatiq, floor: "1.14.0", dependency-version: latest }
          - { extra: rq, dependency: rq, floor: "1.15.0", dependency-version: floor }
          - { extra: rq, dependency: rq, floor: "1.15.0", dependency-version: latest }
          - { extra: sentry, dependency: sentry-sdk, floor: "2.11.0", dependency-version: floor }
          - { extra: sentry, dependency: sentry-sdk, floor: "2.11.0", dependency-version: latest }
          - { extra: langchain, dependency: langchain-core, floor: "0.2.0", dependency-version: floor }
          - { extra: langchain, dependency: langchain-core, floor: "0.2.0", dependency-version: latest }
          - { extra: huggingface-hub, dependency: huggingface_hub, floor: "1.0.0", dependency-version: floor }
          - { extra: huggingface-hub, dependency: huggingface_hub, floor: "1.0.0", dependency-version: latest }
          - { extra: google-cloud, dependency: google-api-core, floor: "2.15.0", dependency-version: floor }
          - { extra: google-cloud, dependency: google-api-core, floor: "2.15.0", dependency-version: latest }
          - { extra: anthropic, dependency: anthropic, floor: "0.34.0", dependency-version: floor }
          - { extra: anthropic, dependency: anthropic, floor: "0.34.0", dependency-version: latest }
          - { extra: openai, dependency: openai, floor: "1.30.0", dependency-version: floor }
          - { extra: openai, dependency: openai, floor: "1.30.0", dependency-version: latest }
          - { extra: pytest, dependency: pytest, floor: "7.0.0", dependency-version: floor }
          - { extra: pytest, dependency: pytest, floor: "7.0.0", dependency-version: latest }
          - { extra: jsonschema, dependency: jsonschema, floor: "4.0.0", dependency-version: floor }
          - { extra: jsonschema, dependency: jsonschema, floor: "4.0.0", dependency-version: latest }
          - { extra: scrapy, dependency: scrapy, floor: "2.8.0", dependency-version: floor }
          - { extra: scrapy, dependency: scrapy, floor: "2.8.0", dependency-version: latest }
          - { extra: fastapi, dependency: fastapi, floor: "0.115.0", dependency-version: floor }
          - { extra: fastapi, dependency: fastapi, floor: "0.115.0", dependency-version: latest }
          - { extra: pymongo, dependency: pymongo, floor: "4.0.0", dependency-version: floor }
          - { extra: pymongo, dependency: pymongo, floor: "4.0.0", dependency-version: latest }
          # stripe==7.0.0 (the original aspirational floor): no
          # AttributeError, no missing wheel -- stripe.StripeError and
          # stripe.CardError simply didn't exist as top-level names yet
          # (only under the older stripe.error.* path this plugin
          # doesn't use). First version with the modern top-level
          # exception classes, confirmed on real Linux: 8.0.0.
          - { extra: stripe, dependency: stripe, floor: "8.0.0", dependency-version: floor }
          - { extra: stripe, dependency: stripe, floor: "8.0.0", dependency-version: latest }
          # alembic==1.7.0 (the original aspirational floor): NameError:
          # name 'TextClause' is not defined, raised inside alembic's own
          # operations/ops.py during the @BatchOperations.register_operation
          # decorator -- a transitive SQLAlchemy-version-drift issue in
          # alembic's own code, not a whytrail bug. Bisected on real Linux:
          # 1.7.0 broken, 1.8.0 and up confirmed passing.
          - { extra: alembic, dependency: alembic, floor: "1.8.0", dependency-version: floor }
          - { extra: alembic, dependency: alembic, floor: "1.8.0", dependency-version: latest }
          # paramiko==2.7.0 (the original aspirational floor):
          # ModuleNotFoundError: No module named 'six' -- ed25519key.py
          # imports six directly, but paramiko's own package metadata at
          # this version doesn't declare it as a dependency, so pip/uv
          # never installs it. A packaging bug in paramiko itself, not a
          # whytrail bug. Bisected on real Linux: still broken at 2.9.0,
          # fixed (six import removed entirely) at 2.10.0.
          - { extra: paramiko, dependency: paramiko, floor: "2.10.0", dependency-version: floor }
          - { extra: paramiko, dependency: paramiko, floor: "2.10.0", dependency-version: latest }
          - { extra: elasticsearch, dependency: elasticsearch, floor: "8.0.0", dependency-version: floor }
          - { extra: elasticsearch, dependency: elasticsearch, floor: "8.0.0", dependency-version: latest }
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install whytrail (core only -- the dependency under test is pinned separately below)
        run: pip install -e ".[dev]"

      - name: Install this integration's test-only tools, if any
        run: |
          case "${{ matrix.extra }}" in
            fastapi) pip install httpx ;;
            rq) pip install fakeredis ;;
          esac

      - name: Install the dependency at the version under test
        run: |
          if [ "${{ matrix.dependency-version }}" = "floor" ]; then
            pip install "${{ matrix.dependency }}==${{ matrix.floor }}"
          else
            pip install --upgrade "${{ matrix.dependency }}"
          fi

      - name: Run this integration's contract tests
        run: |
          name="${{ matrix.extra }}"
          test_name="${name//-/_}"
          pytest "tests/plugin_contract/test_${test_name}_plugin.py" -q

  benchmarks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - name: Run performance benchmarks (informational, not a merge gate yet)
        run: pytest benchmarks/ --benchmark-only
        continue-on-error: true
