[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "whytrail-sqlalchemy"
version = "0.1.0"
description = "whytrail explainer for SQLAlchemy StatementError (statement, params, driver error)"
readme = "README.md"
license = "MIT"
requires-python = ">=3.10"
dependencies = ["whytrail", "sqlalchemy>=2.0"]

[project.entry-points."whytrail.explainers"]
sqlalchemy = "whytrail_sqlalchemy:register"

[tool.hatch.build.targets.wheel]
packages = ["src/whytrail_sqlalchemy"]
