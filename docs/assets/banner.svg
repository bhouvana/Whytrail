<svg width="1200" height="260" viewBox="0 0 1200 260" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="whytrail — Python tells you where. whytrail tells you why. pip install whytrail">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a1930"/>
      <stop offset="100%" stop-color="#132a4a"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="260" fill="url(#bg)"/>
  <rect width="1200" height="260" fill="none" stroke="#1c3a5e" stroke-width="1"/>

  <!-- terminal chrome -->
  <circle cx="34" cy="34" r="6" fill="#2c4a6e"/>
  <circle cx="56" cy="34" r="6" fill="#2c4a6e"/>
  <circle cx="78" cy="34" r="6" fill="#ffd43b"/>

  <!-- install pill, top right -->
  <rect x="930" y="16" width="246" height="38" rx="8" fill="#0d1f36" stroke="#2c4a6e" stroke-width="1"/>
  <text x="952" y="41" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="16" fill="#c7d3e0">$ <tspan fill="#ffd43b">pip install whytrail</tspan></text>

  <line x1="24" y1="66" x2="1176" y2="66" stroke="#1c3a5e" stroke-width="1"/>

  <!-- wordmark -->
  <text x="60" y="165" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="64" font-weight="700" fill="#eaf2fb">whytrail</text>

  <!-- tagline -->
  <text x="62" y="206" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="20" fill="#7d93ad">
    Python tells you <tspan font-style="italic" fill="#a9c3de">where</tspan> something happened. whytrail tells you <tspan font-style="italic" fill="#ffd43b">why</tspan>.
  </text>
</svg>
